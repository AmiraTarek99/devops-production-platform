# ── Production values ────────────────────────────────────────────────
# Dev overrides are in values-dev.yaml
# Jenkins sets image.repository and image.tag at deploy time

replicaCount: 2

image:
  repository: ""       # Set by Jenkins: --set image.repository=ECR_URL
  tag: latest          # Set by Jenkins: --set image.tag=BUILD_TAG
  pullPolicy: Always   # Always pull — ensures latest image is used

service:
  type: ClusterIP      # Internal only — Ingress handles external traffic
  port: 80
  targetPort: 5000

resources:
  requests:
    cpu: 200m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 10
  targetCPUUtilizationPercentage: 70

probes:
  liveness:
    path: /api/health
    initialDelaySeconds: 30
    periodSeconds: 10
    failureThreshold: 3
  readiness:
    path: /api/ready
    initialDelaySeconds: 5
    periodSeconds: 5
    failureThreshold: 3

env:
  ENV: production
  APP_VERSION: "1.0.0"
